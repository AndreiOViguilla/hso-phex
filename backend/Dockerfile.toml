app = "hso-phex-backend"
primary_region = "sin"  # Singapore — closest to Philippines

[build]

[env]
  PORT = "5000"
  NODE_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false   # never sleep
  auto_start_machines = true
  min_machines_running = 1     # always keep 1 running

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
